name: Build and Deploy to CapRover

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate CapRover secrets format
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
        run: |
          if [ -z "$CAPROVER_SERVER" ] || [ -z "$CAPROVER_APP_NAME" ]; then
            echo "::error::CAPROVER_SERVER and CAPROVER_APP_NAME secrets must be set."
            exit 1
          fi
          SERVER="${CAPROVER_SERVER%/}"
          if [[ "$SERVER" != *"captain"* ]]; then
            echo "::error::CAPROVER_SERVER must be your CapRover captain URL (e.g. https://captain.apps.example.com), not your app URL."
            echo "Current value looks like an app or root domain — deploy API calls will return 404 'Nothing here yet'."
            exit 1
          fi
          if [[ "$CAPROVER_APP_NAME" == *"."* ]] || [[ "$CAPROVER_APP_NAME" == *"://"* ]]; then
            echo "::error::CAPROVER_APP_NAME must be the short app name from CapRover (e.g. awesome-soundboard), not a full URL or domain."
            exit 1
          fi

      - name: Create deployment tarball
        run: |
          tar --exclude=node_modules \
            --exclude=.git \
            --exclude=data \
            --exclude=.next \
            --exclude=.github \
            --exclude=deploy.tar \
            -cvf deploy.tar .

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.0.1
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_NAME }}
          token: ${{ secrets.CAPROVER_APP_TOKEN }}
