name: Build and Deploy to CapRover

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate CapRover secrets format
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
        run: |
          if [ -z "$CAPROVER_SERVER" ] || [ -z "$CAPROVER_APP_NAME" ]; then
            echo "::error::CAPROVER_SERVER and CAPROVER_APP_NAME secrets must be set."
            exit 1
          fi
          if [ -z "$CAPROVER_APP_TOKEN" ] && [ -z "$CAPROVER_PASSWORD" ]; then
            echo "::error::Set CAPROVER_APP_TOKEN (recommended) or CAPROVER_PASSWORD for deploy auth."
            exit 1
          fi
          SERVER="${CAPROVER_SERVER%/}"
          APP="$(echo "$CAPROVER_APP_NAME" | tr -d '[:space:]')"
          if [[ "$APP" == *"."* ]] || [[ "$APP" == *"://"* ]]; then
            echo "::error::CAPROVER_APP_NAME must be the short app name from CapRover (e.g. awesome-soundboard), not a URL or domain."
            exit 1
          fi
          if [[ "$SERVER" == *"://${APP}."* ]] || [[ "$SERVER" == *".${APP}."* ]]; then
            echo "::error::CAPROVER_SERVER looks like your app URL (contains the app name). Use your CapRover dashboard URL instead."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preset image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE=ghcr.io/${OWNER}/${REPO}:${TAG}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Deploy to CapRover
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          IMAGE: ${{ env.IMAGE }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: |
          SERVER="${CAPROVER_SERVER%/}"
          APP="$(echo "$CAPROVER_APP_NAME" | tr -d '[:space:]')"

          if [ -n "$CAPROVER_PASSWORD" ]; then
            JWT=$(curl -sS -X POST "${SERVER}/api/v2/login" \
              -H "Content-Type: application/json" \
              -d "{\"password\":\"${CAPROVER_PASSWORD}\"}" | jq -r '.data.token')
            if [[ -z "$JWT" || "$JWT" == "null" ]]; then
              echo "::error::CapRover login failed. Check CAPROVER_PASSWORD."
              exit 1
            fi
            APPS=$(curl -sS "${SERVER}/api/v2/user/apps/appDefinitions" \
              -H "x-captain-auth: ${JWT}" \
              -H "x-namespace: captain" | jq -r '.data.appDefinitions[].appName')
            if ! echo "$APPS" | grep -qx "$APP"; then
              echo "Creating CapRover app '${APP}'..."
              RESPONSE=$(curl -sS -X POST "${SERVER}/api/v2/user/apps/appDefinitions/register" \
                -H "x-captain-auth: ${JWT}" \
                -H "x-namespace: captain" \
                -H "Content-Type: application/json" \
                -d "{\"appName\":\"${APP}\",\"hasPersistentData\":true}")
              echo "$RESPONSE"
              if ! echo "$RESPONSE" | jq -e '.status == 100 or .status == 110' > /dev/null; then
                echo "::error::Failed to create app '${APP}' on CapRover."
                exit 1
              fi
            fi
            caprover deploy \
              --caproverUrl "$SERVER" \
              --caproverPassword "$CAPROVER_PASSWORD" \
              --appName "$APP" \
              -i "$IMAGE"
          else
            caprover deploy \
              --caproverUrl "$SERVER" \
              --appToken "$CAPROVER_APP_TOKEN" \
              --appName "$APP" \
              -i "$IMAGE"
          fi
