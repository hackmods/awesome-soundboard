name: Build and Deploy to CapRover

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate CapRover secrets format
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
        run: |
          if [ -z "$CAPROVER_SERVER" ] || [ -z "$CAPROVER_APP_NAME" ] || [ -z "$CAPROVER_APP_TOKEN" ]; then
            echo "::error::CAPROVER_SERVER, CAPROVER_APP_NAME, and CAPROVER_APP_TOKEN secrets must all be set."
            exit 1
          fi
          SERVER="${CAPROVER_SERVER%/}"
          APP="${CAPROVER_APP_NAME}"
          if [[ "$APP" == *"."* ]] || [[ "$APP" == *"://"* ]]; then
            echo "::error::CAPROVER_APP_NAME must be the short app name from CapRover (e.g. awesome-soundboard), not a URL or domain."
            exit 1
          fi
          if [[ "$SERVER" == *"://${APP}."* ]] || [[ "$SERVER" == *".${APP}."* ]]; then
            echo "::error::CAPROVER_SERVER looks like your app URL (contains the app name). Use your CapRover dashboard URL instead."
            exit 1
          fi

      - name: Preflight CapRover app and API
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: |
          SERVER="${CAPROVER_SERVER%/}"
          APP="${CAPROVER_APP_NAME}"
          URL="${SERVER}/api/v2/user/apps/appData/${APP}"
          HTTP_CODE=$(curl -sS -o /tmp/caprover-preflight.txt -w "%{http_code}" \
            -H "x-captain-auth: ${CAPROVER_APP_TOKEN}" \
            -H "x-namespace: captain" \
            "${URL}")
          echo "GET ${URL} => HTTP ${HTTP_CODE}"
          if grep -q "Nothing here yet" /tmp/caprover-preflight.txt; then
            echo "::error::CapRover returned the nginx default page instead of the API."
            echo "The app '${APP}' probably does not exist on CapRover, or the App Token belongs to a different app."
            echo "In CapRover: create an app named exactly '${APP}', open Deployment, Enable App Token, update CAPROVER_APP_TOKEN."
            exit 1
          fi
          if [[ "$HTTP_CODE" == "404" ]]; then
            echo "::error::App '${APP}' not found on CapRover (HTTP 404)."
            echo "Create the app in the CapRover dashboard with this exact name before deploying."
            exit 1
          fi
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning::Unexpected preflight HTTP ${HTTP_CODE}. Continuing deploy anyway."
            head -c 300 /tmp/caprover-preflight.txt || true
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preset image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE=ghcr.io/${OWNER}/${REPO}:${TAG}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_NAME }}
          token: ${{ secrets.CAPROVER_APP_TOKEN }}
          image: ${{ env.IMAGE }}
