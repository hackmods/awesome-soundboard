name: Build and Deploy to CapRover

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate CapRover secrets format
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
        run: |
          if [ -z "$CAPROVER_SERVER" ] || [ -z "$CAPROVER_APP_NAME" ]; then
            echo "::error::CAPROVER_SERVER and CAPROVER_APP_NAME secrets must be set."
            exit 1
          fi
          SERVER="${CAPROVER_SERVER%/}"
          APP="${CAPROVER_APP_NAME}"
          if [[ "$APP" == *"."* ]] || [[ "$APP" == *"://"* ]]; then
            echo "::error::CAPROVER_APP_NAME must be the short app name from CapRover (e.g. awesome-soundboard), not a full URL or domain."
            exit 1
          fi
          # Fail only when the server URL clearly points at the app site, not the CapRover dashboard.
          if [[ "$SERVER" == *"://${APP}."* ]] || [[ "$SERVER" == *".${APP}."* ]]; then
            echo "::error::CAPROVER_SERVER looks like your app URL (contains the app name). Use your CapRover dashboard URL instead."
            echo "Open the CapRover UI in a browser — that URL is CAPROVER_SERVER (often https://captain.your-root-domain)."
            exit 1
          fi
          if [[ "$SERVER" != *"captain"* ]]; then
            echo "::warning::CAPROVER_SERVER does not contain 'captain'. That is OK for some installs (e.g. http://IP:3000)."
            echo "Make sure this is your CapRover dashboard URL, not your app's public URL."
          fi

      - name: Create deployment tarball
        run: |
          tar --exclude=node_modules \
            --exclude=.git \
            --exclude=data \
            --exclude=.next \
            --exclude=.github \
            --exclude=deploy.tar \
            -cvf deploy.tar .

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.0.1
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_NAME }}
          token: ${{ secrets.CAPROVER_APP_TOKEN }}
