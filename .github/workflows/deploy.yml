name: Build and Deploy to CapRover

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate CapRover secrets format
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
        run: |
          if [ -z "$CAPROVER_SERVER" ] || [ -z "$CAPROVER_APP_NAME" ]; then
            echo "::error::CAPROVER_SERVER and CAPROVER_APP_NAME secrets must be set."
            exit 1
          fi
          if [ -z "$CAPROVER_APP_TOKEN" ] && [ -z "$CAPROVER_PASSWORD" ]; then
            echo "::error::Set CAPROVER_APP_TOKEN (recommended) or CAPROVER_PASSWORD for deploy auth."
            exit 1
          fi
          SERVER="${CAPROVER_SERVER%/}"
          APP="$(echo "$CAPROVER_APP_NAME" | tr -d '[:space:]')"
          if [[ "$APP" == *"."* ]] || [[ "$APP" == *"://"* ]]; then
            echo "::error::CAPROVER_APP_NAME must be the short app name from CapRover (e.g. awesome-soundboard), not a URL or domain."
            exit 1
          fi
          if [[ "$SERVER" == *"://${APP}."* ]] || [[ "$SERVER" == *".${APP}."* ]]; then
            echo "::error::CAPROVER_SERVER looks like your app URL (contains the app name). Use your CapRover dashboard URL instead."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preset image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE=ghcr.io/${OWNER}/${REPO}:${TAG}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to CapRover
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_OTP_TOKEN: ${{ secrets.CAPROVER_OTP_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -euo pipefail
          trap 'echo "::error::Deploy failed at line $LINENO"' ERR

          SERVER="${CAPROVER_SERVER%/}"
          APP="$(echo "$CAPROVER_APP_NAME" | tr -d '[:space:]')"
          CURL=(curl -ksS --fail-with-body)

          echo "Deploying image ${IMAGE} to app ${APP} on ${SERVER}"

          api_json() {
            local label="$1"
            local body="$2"
            if ! echo "$body" | jq -e . >/dev/null 2>&1; then
              echo "::error::${label} returned non-JSON:"
              echo "$body" | head -c 1000
              exit 1
            fi
            echo "$body"
          }

          deploy_image() {
            local header_name="$1"
            local header_value="$2"
            local def_content body response
            def_content=$(jq -n --arg img "$IMAGE" '{schemaVersion: 2, imageName: $img} | tostring')
            body=$(jq -n --arg content "$def_content" '{captainDefinitionContent: $content, gitHash: ""}')
            echo "Posting image deploy to CapRover..."
            response=$("${CURL[@]}" -X POST "${SERVER}/api/v2/user/apps/appData/${APP}?detached=1" \
              -H "${header_name}: ${header_value}" \
              -H "x-namespace: captain" \
              -H "Content-Type: application/json" \
              -d "$body")
            response=$(api_json "CapRover image deploy" "$response")
            echo "$response"
            if ! echo "$response" | jq -e '.status == 100 or .status == 110' >/dev/null; then
              echo "::error::CapRover image deploy was rejected."
              exit 1
            fi
            echo "Deploy accepted by CapRover. Build may take a few minutes on the server."
          }

          if [ -n "$CAPROVER_PASSWORD" ]; then
            echo "Logging in to CapRover..."
            if [ -n "$CAPROVER_OTP_TOKEN" ]; then
              LOGIN_BODY=$(jq -n --arg password "$CAPROVER_PASSWORD" --arg otp "$CAPROVER_OTP_TOKEN" '{password: $password, otpToken: $otp}')
            else
              LOGIN_BODY=$(jq -n --arg password "$CAPROVER_PASSWORD" '{password: $password}')
            fi
            LOGIN_RESPONSE=$("${CURL[@]}" -X POST "${SERVER}/api/v2/login" \
              -H "Content-Type: application/json" \
              -d "$LOGIN_BODY")
            LOGIN_RESPONSE=$(api_json "CapRover login" "$LOGIN_RESPONSE")
            JWT=$(echo "$LOGIN_RESPONSE" | jq -r '.data.token')
            if [[ -z "$JWT" || "$JWT" == "null" ]]; then
              echo "::error::CapRover login failed. Check CAPROVER_PASSWORD (and CAPROVER_OTP_TOKEN if 2FA is enabled)."
              echo "$LOGIN_RESPONSE"
              exit 1
            fi
            echo "Login succeeded."

            echo "Checking for existing app..."
            APPS_RESPONSE=$("${CURL[@]}" "${SERVER}/api/v2/user/apps/appDefinitions" \
              -H "x-captain-auth: ${JWT}" \
              -H "x-namespace: captain")
            APPS_RESPONSE=$(api_json "CapRover app list" "$APPS_RESPONSE")
            APPS=$(echo "$APPS_RESPONSE" | jq -r '(.data.appDefinitions // []) | .[].appName')

            if ! echo "$APPS" | grep -Fxq "$APP"; then
              echo "Creating CapRover app '${APP}'..."
              REGISTER_BODY=$(jq -n --arg app "$APP" '{appName: $app, hasPersistentData: true}')
              REGISTER_RESPONSE=$("${CURL[@]}" -X POST "${SERVER}/api/v2/user/apps/appDefinitions/register" \
                -H "x-captain-auth: ${JWT}" \
                -H "x-namespace: captain" \
                -H "Content-Type: application/json" \
                -d "$REGISTER_BODY")
              REGISTER_RESPONSE=$(api_json "CapRover app register" "$REGISTER_RESPONSE")
              echo "$REGISTER_RESPONSE"
              if ! echo "$REGISTER_RESPONSE" | jq -e '.status == 100 or .status == 110' >/dev/null; then
                echo "::error::Failed to create app '${APP}' on CapRover."
                exit 1
              fi
            else
              echo "App '${APP}' already exists."
            fi

            deploy_image "x-captain-auth" "$JWT"
          elif [ -n "$CAPROVER_APP_TOKEN" ]; then
            deploy_image "x-captain-app-token" "$CAPROVER_APP_TOKEN"
          else
            echo "::error::Set CAPROVER_PASSWORD or CAPROVER_APP_TOKEN."
            exit 1
          fi
